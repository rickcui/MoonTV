# 这个工作流的名称
name: Docker Image CI

# 触发工作流的事件
on:
  # 当有代码推送到 main 分支时
  push:
    branches: [ "main" ]
  # 允许您在 Actions 页面手动触发
  workflow_dispatch:

# 工作流执行的任务
jobs:
  # 任务ID，可以自定义
  build-and-push:
    # 任务运行的环境
    runs-on: ubuntu-latest

    # ---- 新增的权限设置 ----
    permissions:
      contents: read
      packages: write
    # -------------------------

    # 任务的步骤
    steps:
      # 第一步：检出您的代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 第二步：设置 QEMU 以支持多架构构建
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 第三步：设置 Docker Buildx 构建器
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 第四步：登录到 GitHub Container Registry (ghcr.io)
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 第五步：构建并推送多架构镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          # 推送镜像到 ghcr.io
          push: true
          # 构建的平台
          platforms: linux/amd64,linux/arm64
          # 镜像的标签
          tags: ghcr.io/${{ github.repository_owner }}/moontv:latest
